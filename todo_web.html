<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - 待办事项</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            margin-top: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #taskInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #taskInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #prioritySelect {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        #addBtn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        #addBtn:active {
            transform: translateY(0);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover:not(.active) {
            border-color: #667eea;
        }

        .stats {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        #todoList {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .todo-item:hover {
            background: #f0f1f2;
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .priority-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .priority-high { background: #ff6b6b; }
        .priority-normal { background: #ffd93d; }
        .priority-low { background: #6bcb77; }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #667eea;
            border-radius: 50%;
            margin-right: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .checkbox.checked {
            background: #667eea;
        }

        .checkbox.checked::after {
            content: "✓";
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .todo-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            word-break: break-word;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 20px;
            padding: 4px 8px;
            opacity: 0;
            transition: all 0.3s;
        }

        .todo-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            transform: scale(1.2);
        }

        .date {
            font-size: 12px;
            color: #999;
            margin-left: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .clear-btn {
            width: 100%;
            padding: 10px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .clear-btn:hover {
            background: #ffeaea;
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                margin-top: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            #addBtn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Todo List</h1>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="输入待办事项..." />
            <select id="prioritySelect">
                <option value="normal">🟡 普通</option>
                <option value="high">🔴 重要</option>
                <option value="low">🟢 不急</option>
            </select>
            <button id="addBtn">添加</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="pending">进行中</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
        </div>

        <div class="stats" id="stats">总计 0 项 (0 进行中, 0 已完成)</div>

        <ul id="todoList"></ul>

        <button class="clear-btn" id="clearBtn" style="display: none;">🗑️ 清除所有已完成任务</button>
    </div>

    <script>
        // Todo List 应用
        class TodoApp {
            constructor() {
                this.todos = [];
                this.currentFilter = 'all';
                this.loadTodos();
                this.bindEvents();
                this.render();
            }

            loadTodos() {
                const saved = localStorage.getItem('todos');
                if (saved) {
                    this.todos = JSON.parse(saved);
                }
            }

            saveTodos() {
                localStorage.setItem('todos', JSON.stringify(this.todos));
            }

            addTodo(task, priority) {
                const todo = {
                    id: Date.now(),
                    task: task,
                    done: false,
                    priority: priority,
                    createdAt: new Date().toLocaleString('zh-CN'),
                    completedAt: null
                };
                this.todos.unshift(todo);
                this.saveTodos();
                this.render();
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.done = !todo.done;
                    todo.completedAt = todo.done ? new Date().toLocaleString('zh-CN') : null;
                    this.saveTodos();
                    this.render();
                }
            }

            deleteTodo(id) {
                this.todos = this.todos.filter(t => t.id !== id);
                this.saveTodos();
                this.render();
            }

            clearCompleted() {
                this.todos = this.todos.filter(t => !t.done);
                this.saveTodos();
                this.render();
            }

            setFilter(filter) {
                this.currentFilter = filter;
                this.render();
            }

            getFilteredTodos() {
                if (this.currentFilter === 'pending') {
                    return this.todos.filter(t => !t.done);
                } else if (this.currentFilter === 'completed') {
                    return this.todos.filter(t => t.done);
                }
                return this.todos;
            }

            bindEvents() {
                document.getElementById('addBtn').addEventListener('click', () => this.handleAdd());
                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleAdd();
                });

                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.setFilter(e.target.dataset.filter);
                    });
                });

                document.getElementById('clearBtn').addEventListener('click', () => {
                    if (confirm('确定清除所有已完成任务吗？')) {
                        this.clearCompleted();
                    }
                });
            }

            handleAdd() {
                const input = document.getElementById('taskInput');
                const priority = document.getElementById('prioritySelect').value;
                const task = input.value.trim();

                if (task) {
                    this.addTodo(task, priority);
                    input.value = '';
                    input.focus();
                }
            }

            render() {
                const filteredTodos = this.getFilteredTodos();
                const todoList = document.getElementById('todoList');
                const stats = document.getElementById('stats');
                const clearBtn = document.getElementById('clearBtn');

                // 更新统计
                const pendingCount = this.todos.filter(t => !t.done).length;
                const completedCount = this.todos.filter(t => t.done).length;
                stats.textContent = `总计 ${this.todos.length} 项 (${pendingCount} 进行中, ${completedCount} 已完成)`;

                // 显示/隐藏清除按钮
                const hasCompleted = this.todos.some(t => t.done);
                clearBtn.style.display = hasCompleted ? 'block' : 'none';

                // 渲染列表
                if (filteredTodos.length === 0) {
                    todoList.innerHTML = `
                        <li class="empty-state">
                            ${this.currentFilter === 'all' ? '📭 暂无待办事项' :
                              this.currentFilter === 'pending' ? '✅ 所有任务都已完成！' :
                              '📝 还没有已完成的任务'}
                        </li>
                    `;
                    return;
                }

                todoList.innerHTML = filteredTodos.map(todo => `
                    <li class="todo-item ${todo.done ? 'completed' : ''}" data-id="${todo.id}">
                        <div class="priority-dot priority-${todo.priority}"></div>
                        <div class="checkbox ${todo.done ? 'checked' : ''}" onclick="app.toggleTodo(${todo.id})"></div>
                        <span class="todo-text">${this.escapeHtml(todo.task)}</span>
                        <span class="date">${todo.done ? '✓ ' + todo.completedAt : todo.createdAt}</span>
                        <button class="delete-btn" onclick="app.deleteTodo(${todo.id})">✕</button>
                    </li>
                `).join('');
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // 初始化应用
        const app = new TodoApp();
    </script>
</body>
</html>
